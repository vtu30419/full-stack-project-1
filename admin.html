<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="admin.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
    <h2>📊 Admin Dashboard</h2>
</header>

<!-- DASHBOARD CARDS -->
<div class="dashboard">
    <div class="card">
        <h3>Total Events</h3>
        <p id="totalEvents">0</p>
    </div>

    <div class="card">
        <h3>Total Bookings</h3>
        <p id="totalBookings">0</p>
    </div>
</div>

<!-- FORM SECTION -->
<section class="form-section">
    <h3>➕ Create New Event</h3>
    <form id="eventForm">
        <input type="text" id="eventName" placeholder="Event Name" required>
        <input type="date" id="eventDate" required>
        <input type="number" id="ticketPrice" placeholder="Ticket Price" required>
        <input type="number" id="ticketQty" placeholder="Ticket Quantity" required>
        <button type="submit">Add Event</button>
    </form>
</section>

<!-- EVENT TABLE -->
<section class="table-section">
    <h3>📅 Event List</h3>
    <table>
        <thead>
            <tr>
                <th>Event</th>
                <th>Date</th>
                <th>Price</th>
                <th>Tickets</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="eventTable"></tbody>
    </table>
</section>

<!-- BOOKING TABLE -->
<section class="table-section">
    <h3>🎟️ Booking Details</h3>
    <table>
        <thead>
            <tr>
                <th>User Name</th>
                <th>Event</th>
                <th>Tickets</th>
                <th>Amount (₹)</th>
                <th>Date</th>
                <th>Time</th>
                <th>Day</th>
            </tr>
        </thead>
        <tbody id="bookingTable"></tbody>
    </table>
</section>

<script src="admin.js"></script>

</body>
</html>
